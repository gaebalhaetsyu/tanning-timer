<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <!-- 모바일 화면에서도 잘리지 않도록 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>포스트잇 응원 타이머</title>

  <style>
    /* =========================
       1. 기본 색상과 공통 설정
       ========================= */
    :root {
      --page-bg: #f5f1ea;
      --paper: #fff3a8;
      --paper-dark: #ead66f;
      --paper-line: rgba(122, 101, 40, 0.13);
      --ink: #3e372c;
      --muted: #766d5d;
      --button: #fff9cf;
      --button-border: #8d7f62;
      --accent: #f49cae;
      --complete: #c8efc0;
      --shadow: rgba(78, 63, 35, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--ink);
      font-family: Arial, "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at 20% 15%, rgba(244, 156, 174, 0.13), transparent 26%),
        var(--page-bg);
    }

    /* =========================
       2. 전체 위젯
       3:4 증명사진 느낌의 세로 비율
       ========================= */
    .widget {
      position: relative;
      width: min(92vw, 420px);
      aspect-ratio: 3 / 4;
      min-height: 520px;
      max-height: 760px;
      overflow: hidden;
      padding: 30px 26px 26px;
      border: 2px solid rgba(108, 90, 51, 0.22);
      border-radius: 12px 12px 24px 12px;
      background:
        repeating-linear-gradient(
          0deg,
          transparent 0 35px,
          var(--paper-line) 35px 36px
        ),
        var(--paper);
      box-shadow:
        10px 14px 0 var(--shadow),
        inset 0 1px 0 rgba(255,255,255,0.55);
      transition:
        background-color 220ms ease,
        transform 220ms ease;
    }

    /* 메모패드 윗부분 접착 영역 */
    .widget::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 20px;
      background: rgba(230, 201, 83, 0.48);
      border-bottom: 1px dashed rgba(116, 93, 38, 0.18);
    }

    /* 완료 상태에서 포스트잇 색상 변화 */
    .widget.finished {
      background:
        repeating-linear-gradient(
          0deg,
          transparent 0 35px,
          rgba(66, 121, 62, 0.11) 35px 36px
        ),
        var(--complete);
      animation: finish-pop 520ms ease;
    }

    @keyframes finish-pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.025) rotate(-0.6deg); }
      100% { transform: scale(1); }
    }

    /* =========================
       3. 제목과 타이머
       ========================= */
    .title {
      margin: 6px 0 14px;
      text-align: center;
      font-size: clamp(1rem, 4vw, 1.25rem);
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .timer-panel {
      display: grid;
      place-items: center;
      min-height: 138px;
      padding: 14px 12px;
      border: 3px solid var(--ink);
      border-radius: 14px;
      background: rgba(255,255,255,0.32);
      box-shadow: 5px 6px 0 rgba(81, 67, 39, 0.12);
    }

    .time {
      margin: 0;
      text-align: center;
      font-size: clamp(3.7rem, 18vw, 6.3rem);
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.04em;
    }

    .status {
      min-height: 1.4em;
      margin: 10px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .status.complete {
      color: #366d38;
    }

    /* =========================
       4. 시간 입력
       ========================= */
    .input-row {
      display: grid;
      place-items: center;
      gap: 6px;
      width: max-content;
      margin: 18px auto 14px;
      font-weight: 800;
      text-align: center;
    }

    .input-row label {
      display: block;
      width: 100%;
      font-size: 0.9rem;
      text-align: center;
    }

    .input-row input {
      width: 92px;
      height: 42px;
      padding: 0;
      border: 2px solid var(--button-border);
      border-radius: 9px;
      background: #fffdf0;
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      line-height: 42px;
      text-align: center;
      text-align-last: center;
      outline: none;
    }

    /* 숫자 입력창의 위아래 화살표 공간 때문에 숫자가 치우치지 않도록 처리 */
    .input-row input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .input-row input[type="number"]::-webkit-inner-spin-button,
    .input-row input[type="number"]::-webkit-outer-spin-button {
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    .input-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(244, 156, 174, 0.22);
    }

    /* =========================
       5. 버튼
       ========================= */
    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      margin-bottom: 14px;
    }

    button {
      min-height: 44px;
      padding: 8px 10px;
      border: 2px solid var(--button-border);
      border-radius: 10px;
      background: var(--button);
      color: var(--ink);
      font: inherit;
      font-size: 0.86rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(87, 71, 39, 0.18);
      transition:
        transform 80ms ease,
        box-shadow 80ms ease,
        background-color 120ms ease;
    }

    button:hover:not(:disabled) {
      background: #fff1b4;
    }

    button:active:not(:disabled) {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(87, 71, 39, 0.18);
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    #startButton {
      background: #ffd4df;
    }

    #resumeButton {
      background: #d9f0d4;
    }

    #resetButton {
      background: #e7ddff;
    }

    /* =========================
       6. 응원 말풍선
       ========================= */
    .encouragement {
      position: relative;
      min-height: 74px;
      display: grid;
      place-items: center;
      padding: 12px 54px 12px 14px;
      margin: 2px 0 10px;
      border: 2px solid var(--ink);
      border-radius: 16px;
      background: #fff9df;
      text-align: center;
      font-size: clamp(0.84rem, 3.4vw, 1rem);
      font-weight: 900;
      line-height: 1.45;
      word-break: keep-all;
      box-shadow: 5px 6px 0 rgba(87, 71, 39, 0.18);
    }

    .encouragement-text {
      margin: 0;
    }

    /* 응원 문구를 새로 뽑는 작은 버튼 */
    .encouragement-refresh {
      position: absolute;
      top: 50%;
      right: 10px;
      width: 34px;
      min-height: 34px;
      padding: 0;
      border: 2px solid var(--button-border);
      border-radius: 50%;
      background: #ffd4df;
      font-size: 1.1rem;
      line-height: 1;
      box-shadow: 0 3px 0 rgba(87, 71, 39, 0.18);
      transform: translateY(-50%);
    }

    .encouragement-refresh:hover:not(:disabled) {
      background: #ffc3d2;
    }

    .encouragement-refresh:active:not(:disabled) {
      transform: translateY(calc(-50% + 2px));
      box-shadow: 0 1px 0 rgba(87, 71, 39, 0.18);
    }

    /* 문구가 바뀔 때 가볍게 흔들림 */
    .encouragement.change {
      animation: bubble-pop 260ms ease;
    }

    @keyframes bubble-pop {
      0%   { transform: scale(0.96); opacity: 0.55; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* =========================
       7. 분 입력칸 옆 응원 얼굴표정
       새로고침할 때 표정도 함께 바뀝니다.
       ========================= */
    .minute-setting {
      display: grid;
      grid-template-columns: auto auto;
      align-items: end;
      justify-content: center;
      gap: 16px;
      margin: 18px auto 14px;
    }

    .minute-setting .input-row {
      margin: 0;
    }

    .mini-face {
      display: grid;
      place-items: center;
      min-width: 92px;
      min-height: 58px;
      padding: 6px 10px;
      border: 2px solid rgba(62, 55, 44, 0.45);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.36);
      color: var(--ink);
      font-family: "Courier New", "Malgun Gothic", monospace;
      font-size: clamp(1.25rem, 5vw, 1.8rem);
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      box-shadow: 3px 4px 0 rgba(87, 71, 39, 0.12);
    }

    .mini-face.change {
      animation: face-pop 260ms ease;
    }

    .running .mini-face {
      animation: face-bounce 760ms ease-in-out infinite alternate;
    }

    @keyframes face-pop {
      0% {
        transform: scale(0.86);
        opacity: 0.4;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes face-bounce {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-3px);
      }
    }

    /* =========================
       8. 모바일 대응
       ========================= */
    @media (max-width: 420px) {
      body {
        padding: 10px;
      }

      .widget {
        width: min(96vw, 390px);
        min-height: 500px;
        max-height: none;
        padding: 27px 18px 20px;
      }

      .timer-panel {
        min-height: 124px;
      }

      .buttons {
        gap: 7px;
      }

      button {
        min-height: 42px;
        font-size: 0.78rem;
      }

      .encouragement {
        min-height: 68px;
        padding: 10px 48px 10px 10px;
      }

      .encouragement-refresh {
        right: 8px;
        width: 32px;
        min-height: 32px;
        font-size: 1rem;
      }

      .minute-setting {
        gap: 10px;
      }

      .mini-face {
        min-width: 80px;
        min-height: 52px;
        padding: 5px 8px;
        font-size: clamp(1.1rem, 5.5vw, 1.45rem);
      }
    }

    /* 움직임 최소화 설정 사용자를 위한 접근성 처리 */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

<body>
  <main id="widget" class="widget">
    <h1 class="title">포스트잇 응원 타이머</h1>

    <!-- 남은 시간을 크게 보여주는 영역 -->
    <section class="timer-panel" aria-live="polite">
      <p id="timeDisplay" class="time">10:00</p>
      <p id="statusMessage" class="status">집중할 시간을 입력해 주세요.</p>
    </section>

    <!-- 분 입력과 응원 표정을 한 줄에 배치 -->
    <div id="minuteSetting" class="minute-setting">
      <div class="input-row">
        <label for="minuteInput">분</label>

        <input
          id="minuteInput"
          type="number"
          min="1"
          max="180"
          value="10"
          inputmode="numeric"
        />
      </div>

      <div id="cheerFace" class="mini-face" aria-hidden="true">
        *^ㅁ^*
      </div>
    </div>

    <!-- 시작, 일시정지, 재개, 초기화 버튼 -->
    <div class="buttons">
      <button id="startButton" type="button">시작</button>
      <button id="pauseButton" type="button" disabled>일시정지</button>
      <button id="resumeButton" type="button" disabled>재개</button>
      <button id="resetButton" type="button">초기화</button>
    </div>

    <!-- 랜덤 응원 문구가 표시되는 말풍선 -->
    <section id="encouragement" class="encouragement">
      <p id="encouragementText" class="encouragement-text">
        오늘 할 일, 딱 한 조각만 시작해 보자.
      </p>

      <button
        id="refreshEncouragement"
        class="encouragement-refresh"
        type="button"
        aria-label="다른 응원 문구 보기"
        title="다른 응원 문구 보기"
      >
        ↻
      </button>
    </section>


  </main>

  <script>
    /* =========================
       1. 화면 요소 가져오기
       ========================= */
    const widget = document.getElementById("widget");
    const timeDisplay = document.getElementById("timeDisplay");
    const statusMessage = document.getElementById("statusMessage");
    const minuteInput = document.getElementById("minuteInput");
    const encouragement = document.getElementById("encouragement");
    const encouragementText = document.getElementById("encouragementText");
    const refreshEncouragement =
      document.getElementById("refreshEncouragement");
    const minuteSetting = document.getElementById("minuteSetting");
    const cheerFace = document.getElementById("cheerFace");

    const startButton = document.getElementById("startButton");
    const pauseButton = document.getElementById("pauseButton");
    const resumeButton = document.getElementById("resumeButton");
    const resetButton = document.getElementById("resetButton");

    /* =========================
       2. 랜덤 응원 문구
       ========================= */
    const encouragementMessages = [
      "오늘 할 일, 딱 한 조각만 시작해 보자.",
      "계단은 차근차근 올라가는 거야.",
      "시작이 반이야. 지금 한 번 눌러 보자.",
      "완벽하게 말고, 먼저 시작만 해도 충분해.",
      "조금 느려도 괜찮아. 지금 다시 돌아오면 돼.",
      "딴생각이 났다면 적어 두고, 다시 한 줄만 해보자.",
      "지금 이 시간만큼은 다른 창을 잠깐 닫아 두자.",
      "한 번에 하나씩. 지금 고른 일만 보면 돼.",
      "첫 문장, 첫 클릭, 첫 동작 중 하나만 해보자.",
      "잘하고 있어. 남은 시간만큼 같이 가보자.",
      "작게 시작한 일이 제일 오래 간다.",
      "쉬운 부분부터 해도 괜찮아. 손부터 움직여 보자.",
      "다 끝내지 않아도 돼. 지금 할 수 있는 만큼만 하자.",
      "한 칸만 채우자. 다음 칸은 그다음에 생각하면 돼.",
      "멈췄다가 돌아오는 것도 집중의 일부야.",
      "오늘의 작은 진전이 내일의 발판이 돼.",
      "일단 5분만 해보자. 그다음은 나중에 결정해도 돼.",
      "잘하려고 멈추지 말고, 서툴게라도 이어 가자."
    ];

    const cheerFaces = [
      "*^ㅁ^*",
      "•ᴗ•",
      "٩(ˊᗜˋ*)و",
      "(๑•̀ㅂ•́)و✧",
      "ᕦ(ò_óˇ)ᕤ",
      "(*´▽`*)",
      "(ง •̀_•́)ง",
      "✦‿✦",
      "(｡•̀ᴗ-)✧",
      "ヽ(•‿•)ノ"
    ];

    let previousMessageIndex = -1;
    let previousFaceIndex = -1;

    /* 같은 문구가 연속으로 나오지 않도록 랜덤 선택 */
    function showRandomEncouragement() {
      let nextIndex;

      do {
        nextIndex = Math.floor(Math.random() * encouragementMessages.length);
      } while (
        encouragementMessages.length > 1 &&
        nextIndex === previousMessageIndex
      );

      previousMessageIndex = nextIndex;
      encouragementText.textContent = encouragementMessages[nextIndex];

      encouragement.classList.remove("change");
      void encouragement.offsetWidth;
      encouragement.classList.add("change");

      let nextFaceIndex;

      do {
        nextFaceIndex = Math.floor(Math.random() * cheerFaces.length);
      } while (
        cheerFaces.length > 1 &&
        nextFaceIndex === previousFaceIndex
      );

      previousFaceIndex = nextFaceIndex;
      cheerFace.textContent = cheerFaces[nextFaceIndex];

      cheerFace.classList.remove("change");
      void cheerFace.offsetWidth;
      cheerFace.classList.add("change");
    }

    /* =========================
       3. 타이머 상태값
       ========================= */
    let remainingSeconds = 10 * 60;
    let timerId = null;
    let isRunning = false;
    let isPaused = false;

    /* 입력값을 1~180분 사이로 정리 */
    function getInputMinutes() {
      let minutes = Number(minuteInput.value);

      if (!Number.isFinite(minutes)) {
        minutes = 10;
      }

      minutes = Math.floor(minutes);
      minutes = Math.max(1, Math.min(180, minutes));

      minuteInput.value = minutes;
      return minutes;
    }

    /* 남은 초를 MM:SS 형식으로 표시 */
    function updateTimeDisplay() {
      const minutes = Math.floor(remainingSeconds / 60);
      const seconds = remainingSeconds % 60;

      timeDisplay.textContent =
        `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    /* 입력된 분을 기준으로 타이머를 다시 설정 */
    function setTimerFromInput() {
      remainingSeconds = getInputMinutes() * 60;
      updateTimeDisplay();
    }

    /* 버튼 상태를 현재 타이머 상태에 맞게 변경 */
    function updateButtons() {
      startButton.disabled = isRunning || isPaused;
      pauseButton.disabled = !isRunning;
      resumeButton.disabled = !isPaused;
    }

    /* =========================
       4. 카운트다운 실행
       ========================= */
    function runCountdown() {
      timerId = setInterval(() => {
        remainingSeconds -= 1;
        updateTimeDisplay();

        if (remainingSeconds <= 0) {
          finishTimer();
        }
      }, 1000);
    }

    /* 시작 버튼 */
    function startTimer() {
      clearInterval(timerId);

      setTimerFromInput();

      isRunning = true;
      isPaused = false;

      widget.classList.remove("finished");
      minuteSetting.classList.add("running");

      statusMessage.textContent = "집중 중이에요.";
      statusMessage.classList.remove("complete");

      minuteInput.disabled = true;

      showRandomEncouragement();
      updateButtons();
      runCountdown();
    }

    /* 일시정지 버튼 */
    function pauseTimer() {
      if (!isRunning) return;

      clearInterval(timerId);
      timerId = null;

      isRunning = false;
      isPaused = true;

      minuteSetting.classList.remove("running");
      statusMessage.textContent = "잠시 멈췄어요.";

      showRandomEncouragement();
      updateButtons();
    }

    /* 재개 버튼 */
    function resumeTimer() {
      if (!isPaused || remainingSeconds <= 0) return;

      isRunning = true;
      isPaused = false;

      minuteSetting.classList.add("running");
      statusMessage.textContent = "다시 집중 중이에요.";

      showRandomEncouragement();
      updateButtons();
      runCountdown();
    }

    /* 완료 처리 */
    function finishTimer() {
      clearInterval(timerId);
      timerId = null;

      remainingSeconds = 0;
      isRunning = false;
      isPaused = false;

      updateTimeDisplay();

      widget.classList.add("finished");
      minuteSetting.classList.remove("running");

      statusMessage.textContent = "완료!";
      statusMessage.classList.add("complete");

      encouragementText.textContent = "끝까지 왔네! 정말 잘했어.";
      encouragement.classList.remove("change");
      void encouragement.offsetWidth;
      encouragement.classList.add("change");

      minuteInput.disabled = false;
      updateButtons();
    }

    /* 초기화 버튼 */
    function resetTimer() {
      clearInterval(timerId);
      timerId = null;

      isRunning = false;
      isPaused = false;

      widget.classList.remove("finished");
      minuteSetting.classList.remove("running");

      minuteInput.disabled = false;

      setTimerFromInput();

      statusMessage.textContent = "집중할 시간을 입력해 주세요.";
      statusMessage.classList.remove("complete");

      showRandomEncouragement();
      updateButtons();
    }

    /* =========================
       5. 버튼 이벤트 연결
       ========================= */
    startButton.addEventListener("click", startTimer);
    pauseButton.addEventListener("click", pauseTimer);
    resumeButton.addEventListener("click", resumeTimer);
    resetButton.addEventListener("click", resetTimer);
    refreshEncouragement.addEventListener(
      "click",
      showRandomEncouragement
    );

    /* 입력값이 바뀌면 실행 중이 아닐 때 화면 시간도 바로 갱신 */
    minuteInput.addEventListener("change", () => {
      if (!isRunning && !isPaused) {
        setTimerFromInput();
      }
    });

    /* 최초 화면 설정 */
    setTimerFromInput();
    updateButtons();
  </script>
</body>
</html>

<style>
  .encouragement::before,
  .encouragement::after {
    content: none !important;
    display: none !important;
  }
</style>
